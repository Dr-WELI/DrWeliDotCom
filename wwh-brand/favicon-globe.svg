<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="WildWooHoo">
  <title>WildWooHoo favicon - Mirror W globe with rainbow reflection</title>
  <defs>
    <linearGradient id="f-sp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C97A66"/>
      <stop offset="18%" stop-color="#D89E78"/>
      <stop offset="38%" stop-color="#D2B07A"/>
      <stop offset="58%" stop-color="#7D8B5D"/>
      <stop offset="78%" stop-color="#9985A8"/>
      <stop offset="100%" stop-color="#7D6E92"/>
    </linearGradient>
    <linearGradient id="f-wh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="45%" stop-color="#FFF7D8" stop-opacity="1"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="f-gl" cx="38%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".22"/>
      <stop offset="42%" stop-color="#D2B07A" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#7D6E92" stop-opacity=".05"/>
    </radialGradient>
  </defs>
  <!-- Dusk-deep squircle backdrop -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="#050805"/>
  <!-- Globe -->
  <circle cx="50" cy="50" r="35" fill="url(#f-gl)" stroke="rgba(255,255,255,.34)" stroke-width="1.25"/>
  <ellipse cx="50" cy="50" rx="18" ry="35" fill="none" stroke="rgba(210,176,122,.34)" stroke-width="1"/>
  <ellipse cx="50" cy="50" rx="35" ry="10" fill="none" stroke="rgba(255,255,255,.26)" stroke-width="1"/>
  <!-- Top W -->
  <text x="50" y="47" text-anchor="middle"
        font-family="'DM Serif Display','Libre Baskerville',Georgia,'Times New Roman',serif"
        font-weight="400" font-size="54" letter-spacing="-1.5"
        fill="#FBF7EE">W</text>
  <!-- White sunlight band -->
  <line x1="18" y1="51" x2="82" y2="51" stroke="url(#f-wh)" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Rainbow diffraction line -->
  <line x1="16" y1="51" x2="84" y2="51" stroke="url(#f-sp)" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom W: mirror reflection (scaled around y=50) -->
  <g transform="matrix(1 0 0 -1 0 100)">
    <text x="50" y="47" text-anchor="middle"
          font-family="'DM Serif Display','Libre Baskerville',Georgia,'Times New Roman',serif"
          font-weight="400" font-size="54" letter-spacing="-1.5"
          fill="#FBF7EE" opacity="0.55">W</text>
  </g>
</svg>
