    .academic-hero{position:relative;overflow:hidden;isolation:isolate}

    .academic-signal::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(234,228,220,1) 0%, rgba(234,228,220,0) 10%, rgba(234,228,220,0) 90%, rgba(234,228,220,1) 100%);pointer-events:none;z-index:2}
    @keyframes academicSignalMove{from{transform:translateY(-4%)}to{transform:translateY(-52%)}}
    .academic-cap-grid .card h3{letter-spacing:-.03em}
    .academic-cap-grid .card p{max-width:34ch}
